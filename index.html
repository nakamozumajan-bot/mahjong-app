<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🀄️ 公大中麻雀倶楽部 - メインメニュー</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --border-radius: 16px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            --input-bg: #f3f4f6;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            padding: 20px;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 800px; margin: 0 auto; padding-bottom: 40px; }

        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary); font-size: 1.8rem; margin: 0; text-shadow: 2px 2px 4px rgba(255,255,255,0.5); }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.5);
        }

        h2 {
            font-size: 1.2rem;
            color: var(--text-main);
            margin-top: 0;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e5e7eb;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .season-input-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .season-input-row input[type="text"] {
            flex: 1;
            min-width: 180px;
            padding: 12px 15px;
            box-sizing: border-box;
            border: 2px solid transparent;
            background-color: var(--input-bg);
            border-radius: 10px;
            font-size: 1rem;
            color: var(--text-main);
            font-family: 'Noto Sans JP', sans-serif;
        }

        .season-input-row input:focus {
            outline: none;
            background-color: #fff;
            border-color: var(--primary-light);
        }

        .season-add-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .season-add-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .season-add-btn:active { transform: scale(0.98); }

        .season-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .season-card h3 {
            margin: 0 0 16px 0;
            font-size: 1.1rem;
            color: var(--primary);
        }

        .season-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .season-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            background: #fff;
            color: var(--text-main);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 1px solid #e5e7eb;
        }

        .season-links a:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
            color: var(--primary);
        }

        .btn-rename {
            padding: 8px 16px;
            background: #f59e0b;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-rename:hover { background: #d97706; }

        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.55, 0.055, 0.675, 0.19) infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div style="font-weight: bold; color: var(--primary);">データを読み込み中...</div>
    </div>

    <div class="container">
        <header>
            <h1>🀄️ 公大中麻雀倶楽部</h1>
        </header>

        <div class="card">
            <h2>🆕 シーズンを作成</h2>
            <div class="season-input-row">
                <input type="text" id="newSeasonName" placeholder="シーズン名を入力">
                <button class="season-add-btn" onclick="addSeason()">シーズンを追加</button>
            </div>
        </div>

        <div id="seasonsContainer"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://mikcjkqvdjkqkcgsufkh.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pa2Nqa3F2ZGprcWtjZ3N1ZmtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM4NTU5ODIsImV4cCI6MjA3OTQzMTk4Mn0.O4gR7N9279zAsgunCDZre4FJAM2gHT4uwUlFkjEhm-k";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let seasons = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadSeasons();
        });

        function showLoading(isLoading) {
            document.getElementById('loadingOverlay').style.display = isLoading ? 'flex' : 'none';
        }

        async function saveData(key, value) {
            showLoading(true);
            try {
                const { error } = await supabaseClient.from('app_data').upsert(
                    { key: key, value: value },
                    { onConflict: 'key' }
                );
                if (error) throw error;
            } catch (error) {
                alert("データの保存に失敗しました。\n" + error.message);
            } finally {
                showLoading(false);
            }
        }

        async function loadSeasons() {
            showLoading(true);
            try {
                const { data, error } = await supabaseClient.from('app_data').select('*');
                if (error) throw error;
                if (data) {
                    const row = data.find(r => r.key === 'mahjong_seasons');
                    seasons = (row && row.value && Array.isArray(row.value)) ? row.value : [];
                }
                if (seasons.length === 0) {
                    seasons = [{ id: '1', name: 'シーズン1' }];
                    await saveData('mahjong_seasons', seasons);
                }
                renderSeasons();
            } catch (error) {
                alert("データの読み込みに失敗しました。\n" + error.message);
            } finally {
                showLoading(false);
            }
        }

        async function saveSeasons() {
            await saveData('mahjong_seasons', seasons);
        }

        function renderSeasons() {
            const container = document.getElementById('seasonsContainer');
            container.innerHTML = '';
            seasons.forEach(season => {
                const card = document.createElement('div');
                card.className = 'season-card';
                const id = String(season.id);
                const name = (season.name || '').trim() || `シーズン${id}`;
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'btn-rename';
                btn.textContent = '名前を変更';
                btn.dataset.seasonId = id;
                btn.onclick = function () { renameSeason(this.dataset.seasonId); };
                card.innerHTML = `
                    <h3>${escapeHtml(name)}</h3>
                    <div class="season-links">
                        <a href="input.html?season=${encodeURIComponent(id)}">📝 データ入力</a>
                        <a href="history.html?season=${encodeURIComponent(id)}">📈 成績・履歴</a>
                    </div>
                `;
                card.querySelector('.season-links').appendChild(btn);
                container.appendChild(card);
            });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        async function addSeason() {
            const input = document.getElementById('newSeasonName');
            const name = (input && input.value || '').trim();
            if (!name) {
                alert('シーズン名を入力してください。');
                return;
            }
            if (seasons.some(s => (s.name || '').trim() === name)) {
                alert('その名前のシーズンは既に存在します。');
                return;
            }
            const maxId = seasons.reduce((max, s) => {
                const n = parseInt(s.id, 10);
                return isNaN(n) ? max : Math.max(max, n);
            }, 0);
            const newId = String(maxId + 1);
            seasons.push({ id: newId, name: name });
            await saveSeasons();
            renderSeasons();
            if (input) input.value = '';
        }

        async function renameSeason(id) {
            const season = seasons.find(s => String(s.id) === String(id));
            if (!season) return;
            const currentName = (season.name || '').trim() || `シーズン${id}`;
            const newName = prompt('新しいシーズン名を入力してください:', currentName);
            if (newName === null) return;
            const trimmed = newName.trim();
            if (!trimmed) {
                alert('名前を入力してください。');
                return;
            }
            if (seasons.some(s => String(s.id) !== String(id) && (s.name || '').trim() === trimmed)) {
                alert('その名前のシーズンは既に存在します。');
                return;
            }
            season.name = trimmed;
            await saveSeasons();
            renderSeasons();
        }
    </script>
</body>
</html>
